services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env.development
    command: npm run dev
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - neon-local
    restart: unless-stopped

  neon-local:
    image: neondatabase/neon_local:latest
    env_file:
      - .env.development
    ports:
      - '5432:5432'
    restart: unless-stopped
